<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <title>Gateway</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <div class="app">
      <div class="sidebar-overlay" id="sidebar-overlay"></div>
      <aside class="sidebar">
        <div class="tabs-container">
          <button class="tab-btn active" data-tab="koen">한영</button>
          <button class="tab-btn" data-tab="enko">영한</button>
          <button class="tab-btn" data-tab="ko">국어</button>
          <button class="tab-btn" data-tab="history">히스토리</button>
        </div>
        <button class="new-chat" id="new-chat">+ New chat</button>
        <ul class="session-list" id="session-list"></ul>
      </aside>
      <main class="chat">
        <header class="chat-header">
          <button id="toggle-sidebar-btn" class="toggle-sidebar-btn" title="사이드바 접기/열기">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="sidebar-icon">
              <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
              <line x1="9" y1="3" x2="9" y2="21"></line>
            </svg>
          </button>
          <span id="chat-header">New chat</span>
        </header>
        <section class="messages" id="messages"></section>
        <form class="composer" id="composer">
          <textarea
            id="input"
            rows="2"
            placeholder="메시지를 입력하세요. (Shift+Enter로 줄바꿈)"
            autofocus
          ></textarea>
          <button type="submit" id="send">Send</button>
        </form>
      </main>
    </div>
    <script type="module" src="/app.js"></script>
  </body>
</html>
